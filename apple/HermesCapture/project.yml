name: HermesCapture
options:
  bundleIdPrefix: dev.josegabjimenez
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
packages:
  HermesCore:
    path: Packages/HermesCore
targets:
  HermesCaptureiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Apps/iOS
      - path: Apps/Shared
    dependencies:
      - package: HermesCore
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - target: HermesCaptureWatch
        embed: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.josegabjimenez.HermesCapture
      MARKETING_VERSION: 0.2.0
      CURRENT_PROJECT_VERSION: 2
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Hermes
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
  HermesCaptureWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Apps/Watch
      - path: Apps/Shared
    dependencies:
      - package: HermesCore
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.josegabjimenez.HermesCapture.watchkitapp
      MARKETING_VERSION: 0.2.0
      CURRENT_PROJECT_VERSION: 2
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Hermes
      INFOPLIST_KEY_WKApplication: YES
      INFOPLIST_KEY_WKCompanionAppBundleIdentifier: dev.josegabjimenez.HermesCapture
      INFOPLIST_KEY_WKWatchOnly: NO
  HermesCoreTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Packages/HermesCore/Tests/HermesCoreTests
    dependencies:
      - package: HermesCore
    settings:
      GENERATE_INFOPLIST_FILE: YES
schemes:
  HermesCaptureiOS:
    build:
      targets:
        HermesCaptureiOS: all
    test:
      targets:
        - HermesCoreTests
  HermesCaptureWatch:
    build:
      targets:
        HermesCaptureWatch: all
